<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Leitor de sem_socged.xml</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; }
  </style>
</head>
<body>
  <h1>Prestadores sem SOCGED</h1>
  <table id="dados">
    <thead>
      <tr>
        <th>Nome</th>
        <!-- <th>Idade</th>
        <th>Curso</th> -->
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // Carregar o XML
    fetch("sem_socged.xml")
      .then(response => response.text())
      .then(str => (new window.DOMParser()).parseFromString(str, "text/xml"))
      .then(data => {
        const nomes = data.getElementsByTagName("aluno");
        const tbody = document.querySelector("#dados tbody");

        for (let i = 0; i < nomes.length; i++) {
          const nome = nomes[i].getElementsByTagName("nome")[0].textContent;
        //   const idade = nomes[i].getElementsByTagName("idade")[0].textContent;
        //   const curso = nomes[i].getElementsByTagName("curso")[0].textContent;

          const row = document.createElement("tr");
          row.innerHTML = `<td>${nome}</td><td>${idade}</td><td>${curso}</td>`;
          tbody.appendChild(row);
        }
      })
      .catch(err => console.error("Erro ao carregar XML:", err));
  </script>
</body>
</html>
